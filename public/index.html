<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AgriCalc - Kalkulator pertanian modern untuk menghitung populasi tanaman, dosis pupuk hara NPK, kalibrasi nozzle semprot pestisida, dan kelayakan usahatani (BEP/ROI).">
  <title>AgriCalc - Kalkulator Pertanian Modern Presisi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- App Header -->
  <header class="app-header">
    <div class="brand-section">
      <div class="logo-badge">🚜</div>
      <div class="brand-text">
        <h1 id="app-title">AgriCalc</h1>
        <p id="app-tagline">Kalkulator Pertanian Modern</p>
      </div>
    </div>
    
    <div class="header-controls">
      <!-- Theme Switcher -->
      <div class="theme-switch-wrapper" title="Ubah Tema / Toggle Theme">
        <span class="switch-icon">🌙</span>
        <label class="switch" for="theme-toggle">
          <input type="checkbox" id="theme-toggle">
          <span class="slider"></span>
        </label>
        <span class="switch-icon">☀️</span>
      </div>

      <!-- Language Selector -->
      <select id="lang-select" class="lang-dropdown" title="Pilih Bahasa / Select Language">
        <option value="id" selected>Bahasa Indonesia</option>
        <option value="en">English (US)</option>
      </select>

      <!-- Auth / User Section -->
      <div class="auth-section" id="auth-section">
        <button class="btn-auth" id="btn-login" title="Masuk / Login">
          <span class="auth-icon">👤</span>
          <span class="auth-label">Masuk</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Auth Modal Overlay -->
  <div class="modal-overlay" id="auth-modal" style="display:none;">
    <div class="modal-card glass-panel">
      <button class="modal-close" id="auth-modal-close">&times;</button>
      
      <div class="modal-tabs">
        <button class="modal-tab active" data-mode="login">Masuk</button>
        <button class="modal-tab" data-mode="register">Daftar</button>
      </div>

      <form id="auth-form" autocomplete="on">
        <!-- Username (register only) -->
        <div class="form-group" id="fg-username" style="display:none;">
          <label for="auth-username">Username</label>
          <input type="text" id="auth-username" placeholder="min. 3 karakter" autocomplete="username" minlength="3">
        </div>

        <div class="form-group">
          <label for="auth-email">Email</label>
          <input type="email" id="auth-email" placeholder="contoh@email.com" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label for="auth-password">Password</label>
          <input type="password" id="auth-password" placeholder="min. 6 karakter" autocomplete="current-password" minlength="6" required>
        </div>

        <div class="auth-error" id="auth-error" style="display:none;"></div>

        <button type="submit" class="btn-primary btn-auth-submit" id="auth-submit">
          <span class="btn-text">Masuk</span>
          <span class="btn-spinner" style="display:none;"></span>
        </button>
      </form>

      <div class="auth-divider">
        <span>atau gunakan tanpa login</span>
      </div>
      <button class="btn-secondary btn-guest" id="btn-guest">
        Lanjutkan sebagai Tamu
      </button>
    </div>
  </div>

  <!-- Sync Status Indicator -->
  <div class="sync-indicator" id="sync-indicator" style="display:none;">
    <span class="sync-icon">🔄</span>
    <span class="sync-text">Menyinkronkan...</span>
  </div>

  <!-- Main Grid Layout -->
  <div class="app-container">
    
    <!-- Sidebar Navigation -->
    <nav class="sidebar-nav" aria-label="Navigasi Utama">
      <ul class="nav-list" id="nav-list">
        <!-- Renders dynamically from app.js -->
      </ul>
    </nav>

    <!-- Main Content Area -->
    <main class="content-area" id="main-content" aria-live="polite">
      <!-- Renders dynamically from app.js based on activeTab -->
    </main>

  </div>

  <!-- Main ES6 JavaScript Entry -->
  <script type="module" src="app.js"></script>
</body>
</html>
